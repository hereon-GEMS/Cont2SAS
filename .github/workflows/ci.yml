name: CI

# Run on all branches, pushes, and PRs
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APPIMAGE_EXTRACT_AND_RUN: 1
      C2S_HOME: ${{ github.workspace }}

    steps:
      # -----------------------
      # Checkout code
      # -----------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------
      # System dependencies
      # -----------------------
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            wget \
            ghostscript \
            mpi-default-dev

      # -----------------------
      # Download Sassena AppImage
      # -----------------------
      - name: Download Sassena AppImage
        run: |
          mkdir -p Sassena
          curl -L \
            https://codebase.helmholtz.cloud/api/v4/projects/6801/packages/generic/sassena/v1.9.2-f31e3882/Sassena_CPU.AppImage \
            -o Sassena/Sassena.AppImage
          chmod +x Sassena/Sassena.AppImage

      # -----------------------
      # Miniforge + Conda environment
      # -----------------------
      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          auto-activate-base: false
          activate-environment: Cont2Sas
          environment-file: environment.yml
          use-mamba: true
          cache-environment: false   # disable cache to prevent drift

      # -----------------------
      # Force requests install (optional)
      # -----------------------
      - name: Ensure requests is installed
        shell: bash -l {0}
        run: |
          conda install -y requests>=2.31,<3

      # -----------------------
      # Run tests
      # -----------------------
      - name: Run pytest
        shell: bash -l {0}
        run: |
          pytest -v -rsx